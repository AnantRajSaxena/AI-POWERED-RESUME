<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Puzzle — World-Model RL</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 20px }
      #grid { font-family: monospace; }
      button { margin: 4px }
      table.grid { border-collapse: collapse; margin-top: 8px }
      table.grid td { width: 22px; height: 22px; text-align:center; vertical-align:middle; border:1px solid #ddd }
      td.wall { background:#222 }
      td.floor { background:#fff }
      td.agent { background: #2b8; color:#000 }
      td.goal { background:#f44; color:#fff }
      td.path { background:#ffeb3b }
    </style>
  </head>
  <body>
    <h1>Maze — Solve & Ask for Hint</h1>
    <div>
      <label>Level: <select id="levelSelect"></select></label>
      <button onclick="setLevel()">Go</button>
      <button onclick="reset()">Reset</button>
      <button onclick="help()">Ask for Next Step</button>
      <button onclick="showPath()">Show Full Path</button>
      <button onclick="autoFollow()">Auto-Follow Path</button>
    </div>
    <div style="margin-top:8px">
      <strong>Total Score:</strong> <span id="totalScore">0</span>
      &nbsp;&nbsp; <strong>Level Help Count:</strong> <span id="helpCount">0</span>
      &nbsp;&nbsp; <strong>Unlocked:</strong> <span id="unlocked">1</span>
    </div>
    <div style="margin-top:8px">
      <button onclick="step(0)">Up</button>
      <button onclick="step(1)">Down</button>
      <button onclick="step(2)">Left</button>
      <button onclick="step(3)">Right</button>
    </div>
    <div id="grid"></div>
    <div>
      <button onclick="startTrain()">Start Training (background)</button>
    </div>

    <script>
      async function fetchState(){
        const res = await fetch('/state');
        const j = await res.json();
        const s = j.state;
        const w = j.width, h = j.height;
        document.getElementById('totalScore').textContent = j.total_score || 0;
        document.getElementById('helpCount').textContent = j.help_count || 0;
        document.getElementById('unlocked').textContent = j.unlocked_level || 1;

        // render as HTML table
        const tbl = document.createElement('table');
        tbl.className = 'grid';
        for(let y=0;y<h;y++){
          const tr = document.createElement('tr');
          for(let x=0;x<w;x++){
            const td = document.createElement('td');
            const v = s[y*w + x];
            if(v===1){ td.className='wall'; td.textContent=''; }
            else if(v===2){ td.className='agent'; td.textContent='O'; }
            else if(v===3){ td.className='goal'; td.textContent='X'; }
            else { td.className='floor'; td.textContent=''; }
            td.dataset.pos = y+','+x;
            tr.appendChild(td);
          }
          tbl.appendChild(tr);
        }
        const container = document.getElementById('grid');
        container.innerHTML = '';
        container.appendChild(tbl);
        // populate level selector if empty
        const sel = document.getElementById('levelSelect');
        if(sel.options.length===0){
          for(let i=1;i<=100;i++) sel.appendChild(new Option(i,i));
        }
        // disable levels above unlocked
        const unlocked = j.unlocked_level || 1;
        for(let i=0;i<sel.options.length;i++){
          sel.options[i].disabled = (i+1) > unlocked;
        }
        sel.value = j.level || 1;
      }

      async function step(action){
        await fetch('/step', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action})});
        fetchState();
      }

      async function reset(){
        await fetch('/reset');
        fetchState();
      }

      async function setLevel(){
        const lvl = Number(document.getElementById('levelSelect').value || 1);
        const res = await fetch('/level', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({level: lvl})});
        if(!res.ok){
          const j = await res.json();
          alert('Level locked. Reach level: ' + j.unlocked_level);
          return;
        }
        await res.json();
        fetchState();
      }

      let lastPath = null;
      async function help(){
        const res = await fetch('/help');
        const j = await res.json();
        if(j.action===null){
          alert('No path found');
          return;
        }
        lastPath = j.path || null;
        const mapping = ['Up','Down','Left','Right'];
        if(confirm('Suggestion: ' + mapping[j.action] + ' (source: ' + j.source + ').\nApply suggestion?')){
          await step(j.action);
          fetchState();
        } else {
          // highlight next cell
          highlightPath(j.path, 1);
        }
      }

      function highlightPath(path, upto){
        // path is list of [y,x]
        if(!path) return;
        const tbl = document.querySelector('table.grid');
        // clear previous path
        tbl.querySelectorAll('td.path').forEach(td=>td.className = td.className==='agent' ? 'agent' : (td.className==='goal'? 'goal':'floor'));
        for(let i=0;i<Math.min((upto||path.length), path.length); i++){
          const p = path[i];
          const y = p[0], x = p[1];
          const td = tbl.rows[y].cells[x];
          if(td.className !== 'agent' && td.className !== 'goal') td.className = 'path';
        }
      }

      function showPath(){
        if(!lastPath) {
          alert('Ask for help first to compute path.');
          return;
        }
        highlightPath(lastPath, lastPath.length);
      }

      async function autoFollow(){
        if(!lastPath){
          alert('Ask for help first to compute path.');
          return;
        }
        // move along path (skip first which is current)
        for(let i=1;i<lastPath.length;i++){
          const cur = lastPath[i-1];
          const nxt = lastPath[i];
          const dy = nxt[0]-cur[0];
          const dx = nxt[1]-cur[1];
          let a=0;
          if(dy==-1) a=0; else if(dy==1) a=1; else if(dx==-1) a=2; else a=3;
          await step(a);
          await new Promise(r=>setTimeout(r, 150));
        }
        fetchState();
      }

      async function startTrain(){
        await fetch('/train', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({epochs:5})});
        alert('Training started (background)');
      }

      fetchState();
    </script>
  </body>
</html>
